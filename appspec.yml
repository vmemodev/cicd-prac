version: 0.0
os: linux

files:
  - source: /
    destination: /opt/myapp
    overwrite: true

hooks:
  ApplicationStop:
    - location: scripts/stop_app.sh
      timeout: 60
      runas: root

  AfterInstall:
    - location: scripts/install_deps.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/start_app.sh
      timeout: 60
      runas: root

  ValidateService:
    - location: scripts/healthcheck.sh
      timeout: 30
      runas: root